seed.data.csv=classpath:data.csv

# Server Configuration
server.port=8080
spring.http.encoding.charset=UTF-8
spring.http.encoding.force=true

# Database Configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/gym_db_prod?&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=gym_user_prod
spring.datasource.password=gym_password_prod

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.format-sql=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.generate-ddl=false
spring.jpa.open-in-view=false
