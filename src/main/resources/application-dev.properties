seed.data.csv=classpath:data.csv
# Server Configuration
server.port=8080
spring.http.encoding.charset=UTF-8
spring.http.encoding.force=true
# Database Configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/gym_db?&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=gym_user
spring.datasource.password=gym_password
# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.format-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.open-in-view=false
