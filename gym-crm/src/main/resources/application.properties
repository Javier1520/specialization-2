spring.profiles.active=dev
# Actuator Configuration
management.endpoints.web.exposure.include=health,info,prometheus,metrics,circuitbreakers
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true

# Eureka Client
spring.application.name=gym-main-service
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Feign Client Timeout Configuration
feign.circuitbreaker.enabled=true
feign.client.config.gym-workload.connect-timeout=5000
feign.client.config.gym-workload.read-timeout=5000

# Resilience4j Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.workloadService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.workloadService.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.workloadService.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.workloadService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.workloadService.sliding-window-size=10
resilience4j.circuitbreaker.instances.workloadService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.workloadService.register-health-indicator=true
resilience4j.circuitbreaker.instances.workloadService.automatic-transition-from-open-to-half-open-enabled=true

# Resilience4j TimeLimiter Configuration
resilience4j.timelimiter.instances.workloadService.timeout-duration=3s
resilience4j.timelimiter.instances.workloadService.cancel-running-future=true
